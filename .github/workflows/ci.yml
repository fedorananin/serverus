name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS and Linux run the full suite (integration tests spawn a
          # local sshd); Windows has no sshd fixture — unit tests only.
          - os: macos-latest
            test-args: ""
          - os: ubuntu-latest
            test-args: ""
          - os: windows-latest
            test-args: "--lib"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            openssh-server

      - name: Install npm dependencies
        run: npm ci

      - name: Frontend type check
        run: npm run check

      - name: Rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml ${{ matrix.test-args }}

      - name: Build app
        run: npm run tauri build -- --no-bundle
