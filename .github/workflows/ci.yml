name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS and Linux run the full suite (integration tests spawn a
          # local sshd); Windows has no sshd fixture for Rust integration or
          # SSH desktop scenarios, but supported non-SSH scenarios still run.
          - os: macos-latest
            test-args: ""
          - os: ubuntu-latest
            test-args: ""
          - os: windows-latest
            test-args: "--lib"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            openssh-server xclip xvfb

      - name: Install npm dependencies
        run: npm ci

      - name: Architecture boundaries
        run: npm run architecture:check

      - name: Generated bindings are current
        run: npm run bindings:check

      - name: Scenario harness contracts
        run: npm run scenarios:check

      - name: Frontend type check
        run: npm run check

      - name: Frontend tests
        run: npm run test

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace ${{ matrix.test-args }}

      - name: Build app
        run: npm run tauri build -- --no-bundle

      - name: Scenario tests
        if: runner.os != 'Linux'
        run: npm run test:scenarios

      - name: Scenario tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:scenarios

      - name: Upload scenario diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-diagnostics-${{ runner.os }}
          path: .artifacts/scenarios/
          if-no-files-found: ignore
          include-hidden-files: true
